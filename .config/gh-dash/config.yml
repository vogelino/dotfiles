prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Unread
    filters: is:unread
  # - title: Created
  #   filters: reason:author
  # - title: Participating
  #   filters: reason:participating
  # - title: Mentioned
  #   filters: reason:mention
  # - title: Review Requested
  #   filters: reason:review-requested
  # - title: Assigned
  #   filters: reason:assign
  # - title: Subscribed
  #   filters: reason:subscribed
  # - title: Team Mentioned
  #   filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 70
  prsLimit: 20
  prApproveComment: "LGTM! :pray:"
  issuesLimit: 20
  notificationsLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 5
        hidden: true
      createdAt:
        width: 5
        hidden: true
      repo:
        width: 20
        hidden: true
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: false
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: false
  refetchIntervalMinutes: 30
keybindings:
  universal:
    - key: g
      name: lazygit
      command: >
        cd {{.RepoPath}}; lazygit
  prs:
    - key: C
      name: code review
      command: >
        tmux new-window -n "PR-{{.PrNumber}}"
        "wt switch pr:{{.PrNumber}} -x 'claude \"/review {{.PrNumber}}\"'"
    - key: O
      name: octo review
      command: >
        tmux new-window -n "PR-{{.PrNumber}}"
        "cd {{.RepoPath}} && nvim -n -c \"lua vim.api.nvim_create_autocmd('FileType',{pattern='octo',once=true,callback=function() vim.defer_fn(function() local n=tonumber(vim.fn.system('gh pr view {{.PrNumber}} --json reviews | grep -c PENDING')) or 0;vim.cmd(n>0 and 'Octo review resume' or 'Octo review start') end,500) end})\" -c 'Octo pr edit {{.PrNumber}}'"

theme:
  ui:
    sectionsShowCount: true
    table:
      showSeparator: true
      compact: true
pager:
  diff: "diffnav"
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true

