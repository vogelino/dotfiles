bind r source-file ~/.tmux.conf \; display "Reloaded!"		  # Reload with ctrl-r
bind C-k clear-history									                    # Clear the pane

set -g default-terminal "xterm-256color"  			            # Enable all colors in tmux
set -ga terminal-overrides ",*256col*:Tc"

set -g prefix C-a										                        # prefix from ctrl-b to ctrl-a
unbind C-b													                        # allow ctrl-b for other things
bind C-a send-prefix										                    # Pass on ctrl-a for other apps start with 1 instead of 0

set -sg escape-time 1										                    # quicker responses

set -g base-index 1 										                    # Numbering of windows start with 1 instead of 0
setw -g pane-base-index 1 									                # Numbering of Panes start with 1 instead of 0

bind | split-window -h 										                  # Split panes horizontal
bind - split-window -v 										                  # Split panes vertically

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation (Cmd+Ctrl+h/l via Ghostty)
bind -n M-H previous-window
bind -n M-L next-window

bind e kill-pane											                      # Closes the pane
bind w kill-window											                    # Closes the whole window
bind q confirm-before -p "Kill session #S? (y/n)" kill-session

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# Catppuccin theme options
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "none"

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# Status bar (set AFTER catppuccin loads)
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -g status-right-length 100
set -g status-position bottom

# Window format (override catppuccin for consistent sizing)
set -g window-status-format "#[fg=#cdd6f4,bg=#313244] #W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7] #W "

unbind-key "o"
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
)\""

bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session
