# Sesh configuration
# Layouts are persisted by tmux-resurrect (Ctrl-s to save, Ctrl-r to restore)
# First launch: set up your panes manually, then save with Ctrl-s
# Subsequent launches: layouts are auto-restored by tmux-continuum

[default_session]
startup_command = "nvim ."

[[session]]
name = " Dotfiles"
path = "~/.dotfiles"

[[session]]
name = " Downloads"
path = "~/Downloads"
startup_command = "yazi"

[[session]]
name = "vogelino-portfolio"
path = "~/repos/vogelino-portfolio"

[[session]]
name = "a-roh"
path = "~/repos/a-roh"

[[session]]
name = "DeepJudge"
path = "~/repos/dj2"
startup_script = "~/.config/sesh/scripts/dj2-window-processes.sh"

[[session]]
name = "Olfactive Quiz Game Celia"
path = "~/repos/quiz-olfactif-celia"
